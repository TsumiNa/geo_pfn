<script>
"use strict";
const NS="http://www.w3.org/2000/svg";
const el=(t,a,p)=>{const n=document.createElementNS(NS,t);for(const k in a)n.setAttribute(k,a[k]);if(p)p.appendChild(n);return n;};
const txt=(s,x,y,o={})=>{const t=el("text",{x,y,"font-size":o.s||11,fill:o.f||"var(--muted)","text-anchor":o.a||"start","font-weight":o.w||400},o.p);t.textContent=s;return t;};
function mk(id,w,h){const host=document.getElementById(id);host.replaceChildren();const s=el("svg",{viewBox:`0 0 ${w} ${h}`,role:"img"});s.style.maxWidth=w+"px";host.appendChild(s);return s;}

function chReplace(T){
  const W=880,H=210,m={l:130,r:20,t:10,b:28};
  const svg=mk("ch-replace",W,H);
  const metrics=[[T.m_rmse,14.25,13.86,10,16],[T.m_r2,0.786,0.797,0.6,0.85],[T.m_acc,0.688,0.707,0.5,0.75]];
  const rowH=(H-m.t-m.b)/3;
  metrics.forEach(([name,v2,tab,lo,hi],i)=>{
    const y=m.t+i*rowH; const X=v=>m.l+(v-lo)/(hi-lo)*(W-m.l-m.r);
    txt(name,m.l-10,y+rowH/2+4,{a:"end",f:"var(--ink2)",s:12.5,w:600,p:svg});
    el("rect",{x:m.l,y:y+8,width:X(v2)-m.l,height:12,rx:3,fill:"var(--v2)"},svg);
    el("rect",{x:m.l,y:y+24,width:X(tab)-m.l,height:12,rx:3,fill:"var(--tab)"},svg);
    txt("v2 "+v2,X(v2)+5,y+18,{s:11,f:"var(--v2)",p:svg});
    txt("TabICL "+tab,X(tab)+5,y+34,{s:11,f:"var(--tab)",w:600,p:svg});
  });
}
function curves(id,data,T){
  const W=420,H=260,m={l:44,r:14,t:12,b:34};
  const svg=mk(id,W,H);
  const ks=[1,2,3,5]; const all=Object.values(data).flat(); const lo=Math.min(...all,-0.2),hi=0.2;
  const X=i=>m.l+i/(ks.length-1)*(W-m.l-m.r), Y=v=>m.t+(hi-v)/(hi-lo)*(H-m.t-m.b);
  for(const g of [0,-1,-2,-3,-4]){if(g<lo-0.1)continue;el("line",{x1:m.l,y1:Y(g),x2:W-m.r,y2:Y(g),stroke:"var(--grid)"},svg);txt(g,m.l-6,Y(g)+4,{a:"end",p:svg});}
  el("line",{x1:m.l,y1:Y(0),x2:W-m.r,y2:Y(0),stroke:"var(--baseline)","stroke-width":1.3},svg);
  ks.forEach((k,i)=>txt("k="+k,X(i),H-m.b+15,{a:"middle",p:svg}));
  txt(T.gain_axis,m.l,m.t-2,{s:10,p:svg});
  const cols={v2:"var(--v2)",tabicl:"var(--tab)",geopfn:"var(--gp)",hgbt:"var(--hg)"};
  for(const [name,vals] of Object.entries(data)){
    const pts=vals.map((v,i)=>`${X(i)},${Y(v)}`).join(" ");
    el("polyline",{points:pts,fill:"none",stroke:cols[name],"stroke-width":2.2},svg);
    vals.forEach((v,i)=>el("circle",{cx:X(i),cy:Y(v),r:3,fill:cols[name]},svg));
  }
}
function chSoil(T){
  const W=880,H=170,m={l:90,r:20,t:10,b:28};
  const svg=mk("ch-soil",W,H);
  const rows=[["TabICL",0.471,0.843],["TabPFN v2",0.481,0.835],["HGBT",0.491,0.747]];
  const rowH=(H-m.t-m.b)/3; const X=v=>m.l+v/1.0*(W-m.l-m.r);
  for(const g of [0,0.25,0.5,0.75,1.0]){el("line",{x1:X(g),y1:m.t,x2:X(g),y2:H-m.b,stroke:"var(--grid)"},svg);txt(g,X(g),H-m.b+14,{a:"middle",p:svg});}
  rows.forEach(([name,hold,anch],i)=>{
    const y=m.t+i*rowH;
    txt(name,m.l-8,y+rowH/2+4,{a:"end",f:"var(--ink2)",s:12,w:600,p:svg});
    el("rect",{x:m.l,y:y+7,width:X(hold)-m.l,height:11,rx:3,fill:"var(--baseline)"},svg);
    el("rect",{x:m.l,y:y+22,width:X(anch)-m.l,height:11,rx:3,fill:"var(--tab)"},svg);
    txt(hold.toFixed(2),X(hold)+4,y+16,{s:10,p:svg});
    txt(anch.toFixed(2),X(anch)+4,y+31,{s:10,f:"var(--tab)",w:600,p:svg});
  });
  txt(T.soil_axis,(m.l+W-m.r)/2,H-4,{a:"middle",p:svg});
}
function drawAll(T){
  chReplace(T);
  curves("ch-lcsg",{v2:[-0.57,-0.83,-1.57,-1.92],tabicl:[-0.11,-0.60,-0.94,-1.43],geopfn:[-0.72,-1.11,-2.05,-2.70],hgbt:[-0.33,-0.51,-0.73,-1.31]},T);
  curves("ch-l",{v2:[-1.07,-1.94,-3.11,-3.70],tabicl:[-1.53,-2.48,-3.85,-4.57],geopfn:[-1.20,-1.89,-3.50,-3.88],hgbt:[-0.81,-1.36,-2.02,-2.75]},T);
  chSoil(T);
}

function setLang(l){
  document.documentElement.lang=l==='zh'?'zh-CN':l==='ja'?'ja':'en';
  try{localStorage.setItem('geopfn_lang',l);}catch(e){}
  const d=I18N[l]||I18N.zh;
  document.querySelectorAll('[data-i18n]').forEach(e=>{const v=d[e.dataset.i18n];if(v!=null)e.innerHTML=v;});
  document.querySelectorAll('.langbar button').forEach(b=>b.classList.toggle('on',b.dataset.lang===l));
  drawAll(d);
}
document.querySelectorAll('.langbar button').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)));
let init='zh';try{init=localStorage.getItem('geopfn_lang')||'zh';}catch(e){}
setLang(['zh','ja','en'].includes(init)?init:'zh');
</script>
