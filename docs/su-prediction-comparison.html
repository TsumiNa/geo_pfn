<style>
:root{

}
@media (prefers-color-scheme:dark){:root{

:root[data-theme="dark"]{--page:#0d0d0d; --surface:#1a1a19; --ink:#fff; --ink2:#c3c2b7; --muted:#898781;
  --grid:#2c2c2a; --baseline:#383835; --border:rgba(255,255,255,.10);
  --v2:#3987e5; --tab:#199e70; --gp:#eb6834; --true:#c3c2b7; --diag:#5b5a54;}
:root[data-theme="light"]{--page:#f9f9f7; --surface:#fcfcfb; --ink:#0b0b0b; --ink2:#52514e; --muted:#898781;

*{box-sizing:border-box;margin:0}
body{background:var(--page);color:var(--ink);
  font:16px/1.7 system-ui,-apple-system,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;padding:0 20px 80px}
.wrap{max-width:980px;margin:0 auto}
.langbar{position:fixed;top:14px;right:16px;z-index:20;display:flex;gap:2px;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:3px}
.langbar button{border:0;background:transparent;color:var(--ink2);font:600 12px system-ui,sans-serif;padding:5px 11px;border-radius:999px;cursor:pointer}
.langbar button.on{background:var(--gp);color:#fff}
header{padding:48px 0 8px}
.eyebrow{font-family:ui-monospace,Menlo,monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
h1{font-size:clamp(23px,3.4vw,32px);line-height:1.25;font-weight:700;text-wrap:balance;margin:8px 0 6px}
.sub{color:var(--ink2);max-width:68ch}
h2{font-size:19px;font-weight:700;margin:0 0 2px}
section{margin-top:46px}
.sec-eyebrow{font-family:ui-monospace,Menlo,monospace;font-size:12px;letter-spacing:.1em;color:var(--gp);margin-bottom:4px}
p{max-width:72ch;color:var(--ink2);margin:8px 0}p strong{color:var(--ink)}
.tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:22px 0 0}
@media(max-width:640px){.tiles{grid-template-columns:1fr}}
.tile{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.tile .k{font-size:12px;color:var(--muted)}.tile .v{font-size:20px;font-weight:700;margin-top:2px;font-variant-numeric:tabular-nums}
.tile .v small{font-size:12px;font-weight:600;color:var(--ink2)}
.tile.v2{border-left:3px solid var(--v2)}.tile.tab{border-left:3px solid var(--tab)}.tile.gp{border-left:3px solid var(--gp)}
.legend{display:flex;flex-wrap:wrap;gap:16px;margin:6px 0 12px;font-size:13px;color:var(--ink2)}
.legend .it{display:flex;align-items:center;gap:6px}
.sw{width:12px;height:12px;border-radius:50%;flex:none}.sw.line{width:16px;height:0;border-top:2.5px solid;border-radius:0}.sw.diag{width:16px;height:0;border-top:2px dashed var(--diag)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:16px}.row4{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:780px){.row2,.row4{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
.card h3{font-size:14.5px;font-weight:650;margin:0 0 2px}.card .note{font-size:12px;color:var(--muted);margin:0 0 6px;font-variant-numeric:tabular-nums}
svg{display:block;width:100%;height:auto}svg text{font-family:system-ui,-apple-system,"PingFang SC",sans-serif}
.take{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-top:16px}.take b{color:var(--ink)}
footer{margin-top:46px;color:var(--muted);font-size:12.5px}

function scatter(id, v2, tab, gp, T){
  const W=430,H=390,m={l:44,r:10,t:10,b:36},MX=300;
  const hostDiv=document.getElementById(id);hostDiv.replaceChildren();
  const svg=el("svg",{viewBox:`0 0 ${W} ${H}`,role:"img","aria-label":T.sc_aria});svg.style.maxWidth=W+"px";
  hostDiv.appendChild(svg);
  const X=v=>m.l+v/MX*(W-m.l-m.r), Y=v=>H-m.b-v/MX*(H-m.t-m.b);
  for(const g of [0,100,200,300]){
    el("line",{x1:X(g),y1:m.t,x2:X(g),y2:H-m.b,stroke:"var(--grid)"},svg);
    el("line",{x1:m.l,y1:Y(g),x2:W-m.r,y2:Y(g),stroke:"var(--grid)"},svg);
    txt(g,X(g),H-m.b+15,{a:"middle",p:svg}); txt(g,m.l-6,Y(g)+4,{a:"end",p:svg});
  }
  el("line",{x1:X(0),y1:Y(0),x2:X(MX),y2:Y(MX),stroke:"var(--diag)","stroke-width":2,"stroke-dasharray":"5 4"},svg);
  txt(T.sc_xaxis,(m.l+W-m.r)/2,H-4,{a:"middle",p:svg});
  const yl=txt(T.sc_yaxis,0,0,{a:"middle",p:svg});yl.setAttribute("transform",`translate(13,${(H-m.b+m.t)/2}) rotate(-90)`);

}

function setLang(l){
  document.documentElement.lang=l==='zh'?'zh-CN':l==='ja'?'ja':'en';
  try{localStorage.setItem('geopfn_lang',l);}catch(e){}
  const d=I18N[l]||I18N.zh;
  document.querySelectorAll('[data-i18n]').forEach(e=>{const v=d[e.dataset.i18n];if(v!=null)e.innerHTML=v;});
  document.querySelectorAll('.langbar button').forEach(b=>b.classList.toggle('on',b.dataset.lang===l));
  drawAll(d);
}
document.querySelectorAll('.langbar button').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)));
let init='zh';try{init=localStorage.getItem('geopfn_lang')||'zh';}catch(e){}
setLang(['zh','ja','en'].includes(init)?init:'zh');
