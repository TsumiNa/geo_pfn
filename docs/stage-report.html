function parity(id,key){
  const cv=document.getElementById(id);const ctx=cv.getContext('2d');
  const d=PARITY[key];if(!d)return;
  const W=cv.width,H=cv.height,m=44,MX=300;
  ctx.clearRect(0,0,W,H);
  const X=v=>m+Math.min(v,MX)/MX*(W-m-14),Y=v=>H-m-Math.min(Math.max(v,0),MX)/MX*(H-m-14);
  const grid=cssv('--grid'),muted=cssv('--muted'),ink=cssv('--ink2'),gp=cssv('--gp'),tb=cssv('--tab');
  ctx.strokeStyle=grid;ctx.lineWidth=1;ctx.font='10px ui-monospace';ctx.fillStyle=muted;
  for(const g of [0,100,200,300]){
    ctx.beginPath();ctx.moveTo(X(g),Y(0));ctx.lineTo(X(g),Y(MX));ctx.stroke();
    ctx.beginPath();ctx.moveTo(X(0),Y(g));ctx.lineTo(X(MX),Y(g));ctx.stroke();
    ctx.fillText(String(g),X(g)-8,H-m+16);ctx.fillText(String(g),m-30,Y(g)+3);
  }
  ctx.setLineDash([6,4]);ctx.strokeStyle=muted;ctx.lineWidth=1.4;
  ctx.beginPath();ctx.moveTo(X(0),Y(0));ctx.lineTo(X(MX),Y(MX));ctx.stroke();ctx.setLineDash([]);
  ctx.globalAlpha=0.45;
  for(const [arr,color] of [[d.b,tb],[d.g,gp]]){
    ctx.fillStyle=color;
    for(let i=0;i<d.t.length;i++){ctx.beginPath();ctx.arc(X(d.t[i]),Y(arr[i]),2.4,0,6.2832);ctx.fill();}
  }
  ctx.globalAlpha=1;
  const r=DATA.parRmse[key];
  ctx.font='700 12px ui-monospace';
  ctx.fillStyle=gp;ctx.fillText('geo-PFN '+r.g.toFixed(1),m+8,26);
  ctx.fillStyle=tb;ctx.fillText('TabICL '+r.b.toFixed(1),m+8,44);
  ctx.fillStyle=ink;ctx.font='10.5px ui-monospace';
}

  o_s6:"<b>不确定性(领域卖点)成立:</b>N=3 时承诺 90% 的区间实际命中 91.0%,数据越少区间越宽(诚实)。剩余弱点都在保守侧,不危险。",
  o_pos:"<b>定位(本报告的最终立场):</b>通用表格预测已被 TabICL/TabPFN/TabFM 做得足够好(i.i.d. 行、稠密填格),我们没必要也不应该去做 another tabular model。我们要做的是<b>领域专属模型</b>:钻孔、探油、深海探测、相图这类<b>垂直方向强相关、随深度/位置有相变、数据获取昂贵</b>的场景,靠极少的数据点做尽可能好的预测——也只有在这类场景里,<b>不确定性才真正有意义</b>。",
  d_h1:"数据集",
  d_p1:"东京羽田真实钻孔数据:<b>240 口钻孔 / 3,521 个试样</b>。目标 Su(无侧限抗剪强度,kN/m²,均值 ~56)。特征分层:L=坐标+深度;C=廉价土工(Wn,Gs,LL,PL,ρt,e);S=土质类别;G=粒径分数。缺失是<b>块状、非随机(MNAR)</b>:e 缺 22%,粒径缺 52.5%(整孔整列缺)。",
  d_h2:"关键发现:列之间强相关,信号藏在低方差方向",

  sp_call1:"<b>稠密最好 ≠ 稀疏最好。</b>稠密冠军 17M 在稀疏 L 上全程输给 2M——容量带来「从 3 口孔过度外推」的倾向;而 2M 在 N=25/50 比 TabICL 低 6.2/3.3。另外 48k 与 24k 的 2M 曲线几乎重合:<b>2M 的稀疏能力在 ~1M 表处已饱和</b>,继续堆训练不再有收益。",

  u_exp:"<b>校准一句话:</b>模型每次给出区间并声明把握(如「90% 把握 Su 在 40–120」);把几千次承诺收集起来数命中率——说 90% 就中约 90% = 诚实。柱子低于绿线 = 过度自信(危险),高于 = 保守。",

  u_call:"<b>领域卖点成立:</b>极稀疏时不确定性可信(N=3 命中 91.0%,真值落到分布支撑外 ≤0.4%),且数据越少区间越宽(诚实自知)。弱点全在保守侧:N≥25 区间偏宽(命中 97–98%,锐利度浪费)、逐行误差分辨力弱(ρ≈0.2–0.36)——都已列为下一步训练目标。",

  n_c1:"<b>① 特征摄取(最大差距):</b>LCSG 上 TabICL 稠密 13.9 vs 我们 16.4、稀疏 N≥50 全面领先。差距不在先验(SCM 对调已排除)而在架构——它的分布感知列编码器更会「读」特征。",
  n_c2:"<b>② 稀疏目标与模型选择:</b>稠密最好 ≠ 稀疏最好已被证实。训练与选型必须以小上下文指标为准;2M 稀疏已饱和,提升要靠结构/目标而非堆训练。",
  n_c3:"<b>③ 极稀疏外推(N≤6):</b>大模型在 3 口孔时过度外推;点预测无解时,答案是让分布更宽更准(校准已好,锐利度与逐行分辨力 ρ 待提)。",

  n_a1:"<b>分布感知列编码器:</b>借鉴 TabICL 的列级分布编码(对每列的取值分布做集合编码),替换现有列嵌入——直指 ①;完成后重跑稠密+稀疏全套对比。",
  n_a2:"<b>小上下文目标训练:</b>先验中提高 tiny-site(2–3 孔)与稀疏锚点比例;以 N=6/25 稀疏 RMSE + CRPS 作早停与选型标准;小上下文样本加权——直指 ②③。",
  n_a3:"<b>锐利度与逐行不确定性:</b>以校准约束下最小化区间宽度为目标(CRPS 已是合适损失),提升 ρ(让模型知道哪行会错)——直指 ③。",
  n_a4:"<b>等预算规模扫描:</b>2M/17M/40M 在相同表数预算下重训(梯度累积对齐有效批),以稀疏指标画 scaling 曲线——回答 ④。",
  n_a5:"<b>之后:</b>真实数据轻量微调;扩展到多目标(整表属性)与土质分类头;跨场地泛化测试。",
  n_h3:"定位声明",
  n_pos:"<b>我们不做 another tabular model。</b>通用表格预测(行 i.i.d.、稠密上下文、填格子)已被 TabICL/TabPFN/TabFM 做得足够好,再挤进去没有意义。我们要做的是<b>领域专属的稀疏预测模型</b>:钻孔、探油、深海探测、相图——这些领域的数据在垂直/空间方向强相关、随深度或位置发生相变、且每个数据点都昂贵稀少。在这里,「用相似的整体单元(如整孔)做迁移」和「可信的不确定性」不是加分项,而是<b>问题本身</b>。本阶段已经证明:结构先验让我们在中等稀疏区赢过最强通用模型,校准让我们的「不知道」可以被信任——这条路成立,值得继续。",

  lede:"2日間で、実羽田データ(240孔/3,521試料)を試金石、TabICL(最強の汎用表 ICL、BSD-3)を比較対象、一部で hgbt を古典基準として、4本の主線——訓練量とモデル規模、SCM(事前分布)の差、稠密と疎の場面差、列の強相関の影響——を体系的に検証した。本報告は全結果を統合し、結論と次段を示す。",

  o_h2:"物語(時系列)",
  o_s1:"<b>出発点:</b>geo-PFN(2M、2段の行距離アーキテクチャ+我々の geo-SCM)は稠密評価で「実特徴を足すと悪化」(LCSG 22.9 > L 19.2)。第一容疑:事前分布が非現実的。",
  o_s2:"<b>回り道(価値ある否定):</b>「現実的事前分布」——合成特徴を実周辺分布と弱結合に合わせた。結果は<b>単調に有害</b>(半分混ぜて悪化、全部で崩壊)。根因は目標をほぼ深度線形に単純化したこと。教訓:特徴のリアルさ ≠ 良い事前分布、<b>目標の構造の豊かさが重要</b>。",
  o_s3:"<b>真因は訓練不足:</b>訓練表数を 19万→115万に増やすと LCSG−L 差は +3.9→+0.1 に収束;17M は LCSG を L より<b>低く</b>(16.8<17.7)——「特徴が有害」は「モデルが食べ足りない」だった。",
  o_s4:"<b>SCM の判定(スワップ実験):</b>我々の架構を TabICL 自身の SCM で訓練すると、同予算で LCSG 17.7→26.1 に悪化、疎でも全域大差——<b>我々の geo-SCM(深度傾向/層/空間構造)は貢献であり瓶頸ではない</b>。事前分布の路線はここで閉じる。",
  o_s5:"<b>稠密の最良 ≠ 疎の最良:</b>稠密王者 17M は疎で 2M に全域負け(極疎の過外挿);2M は中程度の疎(N=25–50)の L で TabICL に大勝(−3〜−6)。<b>稠密向け最適化=目標の取り違え</b>;なお 17M@48k は中疎の LCSG で TabICL を逆転し始めた(N=25:19.0 対 20.4)。",
  o_s6:"<b>不確実性(領域の売り)は成立:</b>N=3 で宣言 90% の区間が実際 91.0% 的中、データが減るほど区間は広がる(正直)。残る弱点は全て保守側で危険ではない。",
  o_pos:"<b>立ち位置(本報告の最終見解):</b>汎用の表予測は TabICL/TabPFN/TabFM で既に十分(i.i.d. 行・稠密穴埋め)。我々が作るべきは<b>領域特化モデル</b>:ボーリング、石油探査、深海センシング、相図——垂直方向に強く相関し、深度/位置で相転移し、データ取得が高価な場面で、ごく少数の点から最良の予測を出す。そこでのみ<b>不確実性が本当に意味を持つ</b>。",

  d_axis:"安価特徴クラスタの主成分:分散比(棒)と Su への偏相関|深度(注記;橙=|ρ|≥0.3 のみ信号)",
  d_cap:"分散が大きい方向に信号はなく、信号のある方向は分散が小さい——「どの方向を使うか」が「どれだけ分散を見るか」より重要。",
  d_call:"<b>この構造に一度誤導された:</b>「現実的事前分布」は周辺分布と主軸結合を模倣して目標構造を壊した(③ 参照)。訓練不足時に「実特徴で悪化」した理由も説明する:モデルはどの方向を信じるべきか学べていなかった。",
  d_h3:"2つの評価手順(全編共通)",
  d_p3:"全 RMSE は実データ・<b>孔単位</b>のホールドアウト:",
  d_l1:"<b>稠密:</b>5分割 GroupKFold(孔でグループ、seed 42)、各分割は他4分割の全孔を文脈に丸ごと予測;全試料まとめて RMSE。geo-PFN は coherent 文脈(座標最近傍の丸ごと孔、8孔×8アンサンブル);TabICL/hgbt は分割ごと再学習。",
  d_l2:"<b>疎:</b>第0分割(48孔/700試料)をクエリに固定;残り192孔から <b>N 本丸ごと</b>を文脈に抽出(N=3…全部、4シード平均)。実際の調査——近くに数本しか既知孔がない——を模す。",
  d_l3:"<b>公平性:</b>同一手順で全モデルが同じ文脈を見る;geo-PFN の checkpoint は各自の設定で読込、採点コードは完全同一。",
  s_h1:"訓練量:「特徴が有害」の真相",
  s_p1:"同一 2M 架構・同一 geo-SCM で、見た合成表の数だけ変える(横軸、対数)。TabICL の稠密成績を点線参照で示す。",
  s_legTab:"TabICL 参照(稠密)",
  s_xlab:"事前学習の合成表数",
  s_cap1:"訓練量×6 で LCSG(紫)は 22.9→17.7、L(橙)との差は +3.9→+0.1;2M は ~100万表で飽和(230万でも改善なし)。",
  s_call1:"<b>結論:</b>「実特徴を足すと悪化」は主に<b>訓練不足</b>の症状で、事前分布の欠陥ではない。十分訓練後、geo-PFN の L は TabICL を上回り(17.3–17.6 対 18.1)、特徴も正常に使い始める。",
  s_h2:"モデル規模:17M は「特徴の使い手」、だが大きい≠良い",
  s_p2:"同一事前分布での規模比較(行ごとにデータ予算が異なる点に注意;40M は2行とも不安定で結論なし——クリーンな scaling law は等予算スイープ待ち、⑦ 計画参照):",
  s_thSize:"パラメータ",s_thTables:"訓練表数",
  s_h3:"SCM アブレーション:同予算比較、事前分布の路線は収束",
  s_p3:"2組の<b>同予算</b>比較(いずれも 2M、LCSG 稠密 RMSE):左は 19.2万表で「我々の generic geo-SCM」対「現実的事前分布」;右は 115万表で「我々の geo-SCM」対「TabICL の SCM」。",
  s_g1:"@19.2万表:generic 対 現実的事前分布",s_g2:"@115万表:我々の 対 TabICL の SCM",
  s_ours:"我々の geo-SCM",s_p05:"現実的 p=0.5",s_p10:"現実的 p=1.0",s_tscm:"TabICL の SCM",
  s_scmAxis:"LCSG 稠密 RMSE(低いほど良い)",
  s_cap2:"左:現実的事前分布は単調に有害(半分 26.9、全部 30.0 対 同予算 generic 22.6)。右:TabICL の SCM は 26.1 対 我々の 17.7。",
  s_call2:"<b>事前分布の2結論:</b>①「特徴のリアル化」は失敗——目標をほぼ深度線形に単純化し、座標のみの L まで悪化(27.9);②TabICL の汎用 SCM は深度/層/空間結合を欠き、ボーリングでは我々の geo-SCM に明確に劣る。<b>事前分布は瓶頸でなく貢献;残る差は架構(特徴取り込み)にある。</b>",
  sp_p1:"疎こそ我々の本題(⑦ 参照)。図:座標のみ(L)と全特徴(LCSG)で、各モデルの RMSE と文脈孔数 N の関係;橙帯=中程度の疎(N=25–50)。可読性のため代表4本のみ描画、全8変種は下表。",
  sp_capL:"座標のみ L:中疎で geo-PFN 2M(橙)が TabICL(青)を明確に下回る;17M(金)は極疎で顕著に悪い(過外挿)。",
  sp_capG:"全特徴 LCSG:TabICL(青)が総合最強だが、17M@48k(金)は N=12–25 で追いつき/逆転(N=25:19.0 対 20.4);稠密側の差は残る。",
  sp_call1:"<b>稠密の最良 ≠ 疎の最良。</b>稠密王者 17M は疎 L で 2M に全域負け——容量は「3本からの過外挿」傾向を生む;2M は N=25/50 で TabICL より 6.2/3.3 低い。また 2M の 48k と 24k はほぼ重なる:<b>2M の疎性能は ~100万表で飽和</b>、訓練の積み増しは無効。",
  sp_call2:"<b>正直な差:</b>LCSG の N≥50 と稠密側では TabICL が依然全面的に先行(15.1 対 17.5)。分布感知の列エンコーダの特徴効率が高い——次段の架構主攻(⑦)。",
  sp_tblh:"全データ(RMSE;各列の最良を橙)",
  p_exp:"<b>parity 図の読み方:</b>各点は1試料;横軸=真の Su、縦軸=予測。<b>対角点線 y=x に近いほど正確</b>;点群が「寝る」(高値を低く、低値を高く)=平均への回帰で、文脈を読めていない典型。左上に各 RMSE。橙=geo-PFN(2M@24k)、青=TabICL。",
  p_capDL:"稠密 · 座標のみ L:両者とも対角線に沿い、geo-PFN(17.6)が TabICL(18.1)よりやや良い。",
  p_capDG:"稠密 · 全特徴 LCSG:TabICL(13.9)がより締まって対角線に沿う——特徴取り込みの優位が見える。",
  p_capSL:"疎 N=25 · 座標のみ L:一目瞭然——TabICL(30.4)は点群が明確に寝る(平均回帰)、geo-PFN(19.9)は線に沿ったまま。",
  p_capSG:"疎 N=25 · 全特徴 LCSG:両者接近(19.6 対 21.0)、TabICL やや優位。",
  p_call:"<b>一言:</b>疎+座標のみ(左下)で TabICL の点群は「寝る」——大半を平均へ縮める;geo-PFN は丸ごとの近傍孔と類似性を使い、対角線に沿い続ける。この図こそ「構造事前分布が疎で効く」直観的証拠。",
  u_exp:"<b>較正を一言で:</b>モデルは区間と自信を宣言(例「90% の自信で Su は 40–120」);数千件の宣言を集めて的中率を数える——90% と言って ~90% 当てる=正直。棒が緑線未満=過信(危険)、超過=保守的。",
  u_legT:"90% 目標(正直ライン)",
  u_cap:"宣言 90% 区間の実際の的中率 対 文脈孔数(geo-PFN 2M@24k)。最重要の最左:N=3 で L 91.0% 的中。",
  u_call:"<b>領域の売りは成立:</b>極疎で不確実性は信頼できる(N=3 で 91.0%、台の外 ≤0.4%)、データが減るほど区間は広がる(正直な自覚)。弱点は全て保守側:N≥25 の区間過広(97–98%、鋭さの浪費)と行単位の分解能の弱さ(ρ≈0.2–0.36)——いずれも次の訓練目標に組み込み済み。",
  u_more:"完全な較正分析(信頼性図、CRPS、NLL、全表)は独立報告 docs/uncertainty-sparse.html。",
  n_h1:"次段で解くべき核心問題",
  n_c1:"<b>① 特徴取り込み(最大の差):</b>LCSG で TabICL 稠密 13.9 対 我々 16.4、疎 N≥50 も全面先行。差は事前分布ではなく(スワップで排除済み)架構——分布感知の列エンコーダが特徴を「読める」。",
  n_c2:"<b>② 疎の目標とモデル選択:</b>稠密最良 ≠ 疎最良は実証済み。訓練と選定は小文脈指標を基準に;2M の疎は飽和、伸びは構造/目標からで訓練の積み増しではない。",
  n_c3:"<b>③ 極疎の外挿(N≤6):</b>大モデルは3本で過外挿;点予測に解がない時、答えは分布を広く正確に(較正は良好、鋭さと行単位 ρ が課題)。",
  n_c4:"<b>④ クリーンな scaling law 未測:</b>現状は規模ごとにデータ予算が不揃い(40M は不安定)。等予算スイープを疎指標で評価する必要。",
  n_h2:"計画する具体的試行(優先順)",
  n_a1:"<b>分布感知の列エンコーダ:</b>TabICL 式の列分布エンコード(各列の値分布を集合エンコード)で現行の列埋め込みを置換——① 直撃;完了後、稠密+疎の全比較を再走。",
  n_a2:"<b>小文脈目標の訓練:</b>事前分布で tiny-site(2–3孔)と疎アンカーの比率を上げ;N=6/25 の疎 RMSE+CRPS を早期停止と選定の基準に;小文脈サンプルの重み付け——②③ 直撃。",
  n_a3:"<b>鋭さと行単位の不確実性:</b>較正制約下で区間幅を最小化(CRPS が適切な損失)、ρ を上げる(どの行で誤るか自覚)——③ 直撃。",
  n_a4:"<b>等予算の規模スイープ:</b>2M/17M/40M を同一表数で再訓練(勾配蓄積で実効バッチ整合)、疎指標で scaling 曲線——④ に回答。",
  n_a5:"<b>その後:</b>実データの軽い微調整;多目的(全表物性)と土質分類ヘッドへの拡張;サイト間汎化試験。",
  n_h3:"ポジションステートメント",
  n_pos:"<b>another tabular model は作らない。</b>汎用の表予測(i.i.d. 行・稠密文脈・穴埋め)は TabICL/TabPFN/TabFM で十分であり、そこへ割り込む意味はない。我々が作るのは<b>領域特化の疎予測モデル</b>:ボーリング、石油探査、深海センシング、相図——垂直/空間に強相関し、深度や位置で相転移し、1点1点が高価で希少な領域。ここでは「丸ごとの単位(孔)による類似転移」と「信頼できる不確実性」は加点ではなく<b>問題そのもの</b>。本ステージで実証した:構造事前分布は中疎で最強汎用モデルに勝ち、較正は我々の「わからない」を信頼可能にする——この路線は成立し、続ける価値がある。",
  xlab:"文脈孔数 N",
  foot:"証拠 results/haneda/*.json(holdout_*, sparse_*, uncertainty_*, parity_data)· 全て孔単位ホールドアウト・実データ · checkpoints は A100 workdir"
 },
 en:{
  kick:"geo_pfn · stage report · 2026-07-10",
  title:"A domain-specific PFN for sparse borehole prediction: stage summary",
  lede:"Over two days, using the real Haneda data (240 boreholes / 3,521 specimens) as the testbed, TabICL (the strongest general tabular ICL model, BSD-3) as the reference, and hgbt as a classic baseline where useful, we systematically verified four threads: training amount & model size, SCM (prior) differences, dense vs sparse regimes, and the impact of strongly correlated columns. This report integrates all results and sets the next stage.",
  tab1:"① Overview & story",tab2:"② Data & protocols",tab3:"③ Training · size · SCM",tab4:"④ Dense vs sparse",tab5:"⑤ Parity plots",tab6:"⑥ Uncertainty",tab7:"⑦ Conclusions & plan",
  o_h1:"Four headline numbers",
  o_p1:"The vision: input any coordinate + depth (+ the cheap geotech data usually available) and output the full property table of a virtual borehole there, <b>with uncertainty</b>. The four most important results of this stage:",
  o_t1k:"Sparse home turf · L · N=25",o_t1d:"geo-PFN 2M vs TabICL, RMSE. Mid-sparse is our structural advantage zone",
  o_t2k:"Extreme-sparse calibration · N=3",o_t2d:"actual hit rate of the promised-90% interval — uncertainty is trustworthy",
  o_t3k:"Dense LCSG · TabICL vs our best",o_t3d:"feature ingestion is the remaining gap (TabICL 13.9 vs 17M@48k 16.4)",
  o_t4k:"SCM swap · LCSG (matched budget)",o_t4d:"our geo-SCM vs TabICL's SCM — our prior is a contribution",
  o_h2:"The story (in order of events)",
  o_s1:"<b>Starting point:</b> geo-PFN (2M, two-stage row-metric architecture + our geo-SCM prior) got <i>worse</i> with real cheap features in dense evaluation (LCSG 22.9 > L 19.2). First suspect: an unrealistic prior.",
  o_s2:"<b>The detour (a valuable negative):</b> we built a 'realistic prior' matching real feature marginals and weak couplings. It was <b>monotonically harmful</b> (half-mix worse, pure catastrophic) — because it simplified the target to near-linear-in-depth. Lesson: realistic features ≠ a good prior; <b>the target's structural richness matters more</b>.",
  o_s3:"<b>The real cause was under-training:</b> raising training tables from 190k to 1.15M collapsed the LCSG−L gap from +3.9 to +0.1; the 17M model even pushed LCSG <b>below</b> L (16.8 < 17.7) — 'features hurt' was really 'the model was starved'.",
  o_s4:"<b>The SCM verdict (swap experiment):</b> training our architecture on TabICL's own SCM at matched budget degraded LCSG from 17.7 to 26.1 and lost badly across the sparse range — <b>our geo-SCM (depth trend / layers / spatial structure) is a contribution, not the bottleneck</b>. The prior direction is closed.",
  o_s5:"<b>Best-at-dense ≠ best-at-sparse:</b> the dense champion 17M loses to the 2M across the whole sparse range on L (over-extrapolation at extreme sparsity), while the 2M beats TabICL by 3–6 RMSE in mid-sparse L. <b>Optimizing for dense was optimizing the wrong objective.</b> Meanwhile 17M@48k starts beating TabICL on mid-sparse LCSG (N=25: 19.0 vs 20.4).",
  o_s6:"<b>Uncertainty (the domain selling point) holds:</b> at N=3 the promised-90% intervals actually hit 91.0%, and intervals widen honestly as data shrinks. Remaining weaknesses are all on the conservative side — not dangerous.",
  o_pos:"<b>Positioning (the final stance of this report):</b> general tabular prediction is already well served by TabICL/TabPFN/TabFM (i.i.d. rows, dense cell-filling); there is no point building another tabular model. What we build is a <b>domain-specific model</b> for boreholes, oil exploration, deep-sea sensing, phase diagrams — settings with <b>strong vertical correlation, phase transitions with depth/position, and expensive, scarce data</b> — where predictions must come from very few points, and where <b>uncertainty genuinely matters</b>.",
  d_h1:"Dataset",
  d_p1:"Real Tokyo-Haneda boreholes: <b>240 holes / 3,521 specimens</b>. Target Su (undrained shear strength, kN/m², mean ~56). Feature layers: L = coords+depth; C = cheap geotech (Wn, Gs, LL, PL, ρt, e); S = soil class; G = grain-size fractions. Missingness is <b>block-wise and not-at-random (MNAR)</b>: e 22%, grain 52.5% (whole columns per hole).",
  d_h2:"Key finding: columns strongly correlated, signal hides in low-variance directions",
  d_p2:"Depth alone explains <b>R²=0.564</b> of log-Su; the 6 cheap features together add only <b>+0.12</b>. And those 6 columns are highly collinear: <b>PC1 carries 76.5% of the variance yet is redundant with depth and carries almost no Su signal</b> (partial corr +0.02 given depth); the incremental signal lives in PC3/PC4 — low-amplitude 'feature contrast' directions with only ~8% of the variance.",
  d_pcorr:"partial corr | depth",
  d_axis:"Cheap-feature cluster PCs: variance share (bar) and partial corr with Su | depth (label; orange = |ρ|≥0.3 carries signal)",
  d_cap:"The high-variance direction has no signal; the signal directions have little variance — which direction to use matters more than how much variance you see.",
  d_call:"<b>This structure misled us once:</b> the 'realistic prior' imitated the marginals and dominant-axis coupling and destroyed the target structure (see ③). It also explains why an under-trained model got worse with real features: it hadn't learned which direction to trust.",
  d_h3:"Two evaluation protocols (used throughout)",
  d_p3:"All RMSE is on real data with <b>whole-borehole</b> holdout:",
  d_l1:"<b>Dense:</b> 5-fold GroupKFold (grouped by borehole, seed 42); each fold predicted with all boreholes of the other 4 folds as context; RMSE pooled over all specimens. geo-PFN uses coherent context (nearest whole boreholes by coordinate, 8 holes × 8 ensembles); TabICL/hgbt refit per fold.",
  d_l2:"<b>Sparse:</b> fold 0 (48 holes / 700 specimens) fixed as query; <b>N whole boreholes</b> drawn from the remaining 192 as context (N=3…all, averaged over 4 seeds). Emulates a real survey: only a few known holes nearby.",
  d_l3:"<b>Fairness:</b> all models see the same context under the same protocol; geo-PFN checkpoints load their own configs, scoring code identical.",
  s_h1:"Training amount: the truth behind 'features hurt'",
  s_p1:"Same 2M architecture, same geo-SCM prior; only the number of synthetic tables seen changes (x-axis, log). TabICL's dense scores are dashed references.",
  s_legTab:"TabICL reference (dense)",
  s_xlab:"pre-training synthetic tables",
  s_cap1:"6× more training takes LCSG (violet) from 22.9 to 17.7 and the gap to L (orange) from +3.9 to +0.1; the 2M saturates at ~1M tables (no further gain at 2.3M).",
  s_call1:"<b>Conclusion:</b> 'real cheap features make it worse' was mainly an <b>under-training</b> symptom, not a prior defect. Properly trained, geo-PFN's L beats TabICL (17.3–17.6 vs 18.1) and it starts using the features normally.",
  s_h2:"Model size: the 17M is the 'feature exploiter', but bigger ≠ better",
  s_p2:"Sizes under the same prior (note the unequal data budgets per row — compare with care; the 40M rows are volatile and inconclusive; a clean scaling law awaits the equal-budget sweep, see ⑦):",
  s_thSize:"params",s_thTables:"training tables",
  s_h3:"SCM ablation: matched-budget comparisons close the prior question",
  s_p3:"Two <b>matched-budget</b> comparisons (all 2M, dense LCSG RMSE): left, at 192k tables, our generic geo-SCM vs the 'realistic prior'; right, at 1.15M tables, our geo-SCM vs TabICL's SCM.",
  s_g1:"@192k tables: generic vs realistic prior",s_g2:"@1.15M tables: ours vs TabICL's SCM",
  s_ours:"our geo-SCM",s_p05:"realistic p=0.5",s_p10:"realistic p=1.0",s_tscm:"TabICL's SCM",
  s_scmAxis:"dense LCSG RMSE (lower is better)",
  s_cap2:"Left: the realistic prior is monotonically harmful (half 26.9, pure 30.0 vs matched generic 22.6). Right: TabICL's SCM gives 26.1 vs ours 17.7.",
  s_call2:"<b>Two prior conclusions:</b> (1) 'feature realism' failed — it simplified the synthetic target to near-linear-in-depth, dragging down even coords-only L (27.9); (2) TabICL's general SCM lacks depth/layer/spatial coupling and clearly loses to our geo-SCM on borehole data. <b>The prior is a contribution, not the bottleneck; the remaining gap is architectural (feature ingestion).</b>",
  sp_p1:"Sparse is what we actually care about (see ⑦). Below: RMSE vs context size N with coords only (L) and full features (LCSG); the orange band is the mid-sparse zone (N=25–50). Four representative lines for readability; all 8 variants in the tables.",
  sp_capL:"Coords-only L: in mid-sparse, geo-PFN 2M (orange) sits clearly below TabICL (aqua); the 17M (gold) is much worse at extreme sparsity (over-extrapolation).",
  sp_capG:"Full features LCSG: TabICL (aqua) is strongest overall, but 17M@48k (gold) catches/overtakes at N=12–25 (N=25: 19.0 vs 20.4); the dense-side gap remains.",
  sp_call1:"<b>Best-at-dense ≠ best-at-sparse.</b> The dense champion 17M loses to the 2M across sparse L — capacity brings a tendency to over-extrapolate from 3 holes; the 2M is 6.2/3.3 below TabICL at N=25/50. Also the 2M's 48k and 24k curves nearly coincide: <b>its sparse ability saturates at ~1M tables</b> — piling on training no longer pays.",
  sp_call2:"<b>The honest gap:</b> on LCSG at N≥50 and dense, TabICL still leads across the board (15.1 vs our 17.5). Its distribution-aware column encoder uses features more efficiently — the main architectural target of the next stage (see ⑦).",
  sp_tblh:"Full data (RMSE; best per column in orange)",
  p_exp:"<b>How to read a parity plot:</b> each dot is one specimen; x = true Su, y = predicted. <b>The closer to the dashed diagonal y=x, the better</b>; a 'flattened' cloud (high values predicted low, low predicted high) = regression to the mean — the signature of a model that cannot read its context. RMSE annotated top-left. Orange = geo-PFN (2M@24k), aqua = TabICL.",
  p_capDL:"Dense · coords-only L: both hug the diagonal; geo-PFN (17.6) slightly better than TabICL (18.1).",
  p_capDG:"Dense · full features LCSG: TabICL (13.9) is tighter on the diagonal — the feature-ingestion advantage made visible.",
  p_capSL:"Sparse N=25 · coords-only L: unmistakable — TabICL's cloud (30.4) flattens (regression to the mean) while geo-PFN (19.9) stays on the line.",
  p_capSG:"Sparse N=25 · full features LCSG: close (19.6 vs 21.0), TabICL slightly ahead.",
  p_call:"<b>In one line:</b> sparse + coords-only (bottom-left) shows TabICL's cloud lying flat — it shrinks most specimens toward the mean; geo-PFN, taking whole neighbour boreholes and exploiting borehole similarity, keeps its cloud stretched along the diagonal. This picture is the direct visual evidence that the structural prior works when data is scarce.",
  u_exp:"<b>Calibration in one line:</b> the model states an interval with a confidence (e.g. '90% sure Su is 40–120'); collect thousands of such promises and count the hits — saying 90% and hitting ~90% = honest. Bars below the green line = over-confident (dangerous); above = conservative.",
  u_legT:"90% target (honesty line)",

function setLang(l){
  document.documentElement.lang=l==='zh'?'zh-CN':l==='ja'?'ja':'en';
  try{localStorage.setItem('geopfn_lang',l);}catch(e){}
  T=I18N[l]||I18N.zh;
  document.querySelectorAll('[data-i18n]').forEach(e=>{const v=T[e.dataset.i18n];if(v!=null)e.innerHTML=v;});
  document.querySelectorAll('.langbar button').forEach(b=>b.classList.toggle('on',b.dataset.lang===l));
  drawAll();
}
document.querySelectorAll('.langbar button').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)));
