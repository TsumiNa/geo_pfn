const DATA={
 Ns:[3,6,12,25,50,100,192],

 LCSG:{cov:{c50:[.497,.483,.538,.663,.646,.665,.703],c80:[.766,.770,.854,.935,.919,.928,.946],c90:[.854,.875,.940,.979,.972,.978,.981],c95:[.900,.944,.975,.995,.990,.989,.989]},

};
const LEVELS=[['c50',.5,'var(--c50)'],['c80',.8,'var(--c80)'],['c90',.9,'var(--c90)'],['c95',.95,'var(--c95)']];
const NS='http://www.w3.org/2000/svg';
const el=(n,a,p)=>{const e=document.createElementNS(NS,n);for(const k in a)e.setAttribute(k,a[k]);if(p)p.appendChild(e);return e;};
const tip=document.getElementById('tip');
document.addEventListener('mousemove',e=>{if(e.target.tagName!=='circle')tip.style.opacity=0;});
function xmap(W,m){const Ns=DATA.Ns,lx=Ns.map(n=>Math.log(n)),x0=Math.min(...lx),x1=Math.max(...lx);
  return v=>m.l+(Math.log(v)-x0)/(x1-x0)*(W-m.l-m.r);}
function covChart(id,fs){
  const svg=document.getElementById(id);svg.replaceChildren();
  const W=420,H=300,m={l:42,r:12,t:12,b:38},Ns=DATA.Ns;
  const X=xmap(W,m),yLo=0.4,yHi=1.0,Y=v=>H-m.b-(v-yLo)/(yHi-yLo)*(H-m.t-m.b);
  for(let g=0.4;g<=1.001;g+=0.1){el('line',{x1:m.l,y1:Y(g),x2:W-m.r,y2:Y(g),stroke:'var(--grid)'},svg);
    el('text',{x:m.l-6,y:Y(g)+3.5,'text-anchor':'end',fill:'var(--muted)','font-size':9.5,'font-family':'var(--mono)'},svg).textContent=g.toFixed(1);}
  for(const n of Ns)el('text',{x:X(n),y:H-m.b+15,'text-anchor':'middle',fill:'var(--muted)','font-size':9.5,'font-family':'var(--mono)'},svg).textContent=(n===192?'all':n);
  el('text',{x:(m.l+W-m.r)/2,y:H-4,'text-anchor':'middle',fill:'var(--ink2)','font-size':10.5,'font-weight':600},svg).textContent=T.xlab;
  for(const [key,nom,color] of LEVELS){
    el('line',{x1:m.l,y1:Y(nom),x2:W-m.r,y2:Y(nom),stroke:color,'stroke-width':1.1,'stroke-dasharray':'5 4','stroke-opacity':.65},svg);
    const v=DATA[fs].cov[key];const pts=v.map((y,i)=>`${X(Ns[i])},${Y(y)}`).join(' ');
    el('polyline',{points:pts,fill:'none',stroke:color,'stroke-width':2.3,'stroke-linejoin':'round'},svg);
    v.forEach((y,i)=>{const c=el('circle',{cx:X(Ns[i]),cy:Y(y),r:3,fill:color,stroke:'var(--panel)','stroke-width':1.1},svg);
      c.addEventListener('mouseenter',ev=>{tip.textContent=`${fs} cov@${nom}  N=${Ns[i]===192?'all':Ns[i]}  ${y.toFixed(3)}`;tip.style.left=(ev.clientX+12)+'px';tip.style.top=(ev.clientY+12)+'px';tip.style.opacity=1;});});
  }
}
function crpsChart(){
  const svg=document.getElementById('crps');svg.replaceChildren();
  const W=580,H=280,m={l:42,r:56,t:12,b:38},Ns=DATA.Ns;
  const X=xmap(W,m);
  const vals=[...DATA.L.crps,...DATA.LCSG.crps];const yLo=Math.floor(Math.min(...vals)-1),yHi=Math.ceil(Math.max(...vals)+1);
  const Y=v=>H-m.b-(v-yLo)/(yHi-yLo)*(H-m.t-m.b);
  for(let g=Math.ceil(yLo/2)*2;g<=yHi;g+=2){el('line',{x1:m.l,y1:Y(g),x2:W-m.r,y2:Y(g),stroke:'var(--grid)'},svg);
    el('text',{x:m.l-6,y:Y(g)+3.5,'text-anchor':'end',fill:'var(--muted)','font-size':9.5,'font-family':'var(--mono)'},svg).textContent=g;}
  for(const n of Ns)el('text',{x:X(n),y:H-m.b+15,'text-anchor':'middle',fill:'var(--muted)','font-size':9.5,'font-family':'var(--mono)'},svg).textContent=(n===192?'all':n);
  el('text',{x:(m.l+W-m.r)/2,y:H-4,'text-anchor':'middle',fill:'var(--ink2)','font-size':10.5,'font-weight':600},svg).textContent=T.xlab;
  el('text',{x:13,y:(m.t+H-m.b)/2,'text-anchor':'middle',fill:'var(--ink2)','font-size':11,'font-weight':600,transform:`rotate(-90,13,${(m.t+H-m.b)/2})`},svg).textContent='CRPS';
  for(const [fs,color] of [['L','var(--l)'],['LCSG','var(--lcsg)']]){
    const v=DATA[fs].crps;const pts=v.map((y,i)=>`${X(Ns[i])},${Y(y)}`).join(' ');
    el('polyline',{points:pts,fill:'none',stroke:color,'stroke-width':2.4,'stroke-linejoin':'round'},svg);
    v.forEach((y,i)=>{const c=el('circle',{cx:X(Ns[i]),cy:Y(y),r:3.2,fill:color,stroke:'var(--panel)','stroke-width':1.1},svg);
      c.addEventListener('mouseenter',ev=>{tip.textContent=`${fs}  N=${Ns[i]===192?'all':Ns[i]}  CRPS ${y.toFixed(2)}`;tip.style.left=(ev.clientX+12)+'px';tip.style.top=(ev.clientY+12)+'px';tip.style.opacity=1;});});
    el('text',{x:X(Ns[Ns.length-1])+7,y:Y(v[v.length-1])+3.5,fill:color,'font-size':11,'font-weight':700},svg).textContent=fs;
  }
}
function tbl(){
  const Ns=DATA.Ns;
  let h=`<tr><th>N</th><th>CRPS·L</th><th>cov@0.9·L</th><th>w90·L</th><th>ρ·L</th><th>CRPS·LCSG</th><th>cov@0.9·LCSG</th><th>ρ·LCSG</th></tr>`;
  for(let i=0;i<Ns.length;i++){
    h+=`<tr><td>${Ns[i]===192?'all':Ns[i]}</td><td>${DATA.L.crps[i].toFixed(1)}</td><td>${DATA.L.cov.c90[i].toFixed(3)}</td><td>${DATA.L.w90[i].toFixed(0)}</td><td>${DATA.L.rho[i].toFixed(2)}</td>`+
       `<td>${DATA.LCSG.crps[i].toFixed(1)}</td><td>${DATA.LCSG.cov.c90[i].toFixed(3)}</td><td>${DATA.LCSG.rho[i].toFixed(2)}</td></tr>`;
  }
  document.getElementById('tbl').innerHTML=h;
}

  kick:"geo_pfn · sparse uncertainty · calibration eval",
  title:"With only a few boreholes of context, can geo-PFN's uncertainty be trusted?",
  lede:"The core deliverable of our niche: when data is scarce, the model must give not just a value but <b>trustworthy</b> uncertainty. This eval runs the sparse protocol (fixed 48-hole query, N whole holes drawn as context) and rigorously tests geo-PFN's full predictive distribution. Model: 2M @24k (the best sparse checkpoint).",
  s1h:"How it is measured",
  s1p:"geo-PFN's bar-distribution head outputs a full distribution per query point; the 8 ensemble histograms are combined via their context affines into an <b>exact mixture</b> (all metrics in closed form, Monte-Carlo validated): <b>coverage</b> (how often the nominal c% interval contains the truth; below nominal = over-confident), <b>CRPS</b> (a proper score for calibration + sharpness, lower is better), <b>w90</b> (mean width of the 90% interval), <b>ρ</b> (Spearman corr of predicted std with actual error — does the model know where it is wrong).",
  s2h:"Headline: coverage vs nominal (calibration plot)",
  s2p:"Each solid line = empirical coverage at one nominal level; dashed = the nominal. <b>On the dashed line = calibrated; below = over-confident (dangerous); above = conservative (too wide)</b>.",
  legNom:"nominal (ideal)",
  capCovL:"Coords-only (L): at N=3, cov@0.9 = 0.910 — near-perfect calibration; at N≥25 all levels run high (conservative).",
  capCovLCSG:"With real features (LCSG): mild over-confidence at N=3–6 (cov@0.9 = 0.85–0.88); conservative from N≥12.",
  s2call:"<b>The hypothesis is (benignly) refuted:</b> the feared 'confidently wrong at extreme sparsity' <b>does not happen</b>. On L the model is near-perfectly calibrated at N=3 (0.910 vs 0.9), truths fall outside the predicted support ≤0.4% of the time, and the model genuinely <b>widens its intervals</b> as context shrinks (w90: 86 → 106 from all → N=3). The only mild over-confidence is LCSG at N≤6 (0.85–0.88), and it is moderate.",
  s3h:"Distributional quality vs context (CRPS)",
  s3p:"CRPS penalises inaccuracy and bluntness together — the overall score for distributional prediction. It improves monotonically with N (L: 14.7 → 9.9): no sparsity level 'collapses'.",
  capCrps:"CRPS falls monotonically with context size N (lower is better); L and LCSG track each other.",
  s3call:"<b>Two improvement areas (both on the conservative side, not the dangerous side):</b> (1) from N≥25 the intervals are clearly too wide (cov@0.9 ≈ 0.97–0.98 vs nominal 0.90) — sharpness is being left on the table; recalibration or a training objective can tighten them. (2) ρ is only +0.2–0.36 — the model knows how uncertain it is overall but is <b>weak at ranking which rows it will get wrong</b>.",

  v1:"<b>The core claim holds: uncertainty is trustworthy at extreme sparsity.</b> Near-perfect calibration at N=3 with coords only (cov@0.9 = 0.910), catastrophic over-confidence (outside support) ≤0.4%. The model honestly widens its intervals as data shrinks — exactly the capability our domain needs and general tabular models don't offer.",
  v2:"<b>Mild weakness:</b> LCSG at N≤6 is moderately over-confident (0.85–0.88 vs 0.90); the 17M cross-check shows the same pattern with worse point predictions — reaffirming the 2M for sparse use.",

function setLang(l){
  document.documentElement.lang=l==='zh'?'zh-CN':l==='ja'?'ja':'en';
  try{localStorage.setItem('geopfn_lang',l);}catch(e){}
  T=I18N[l]||I18N.zh;
  document.querySelectorAll('[data-i18n]').forEach(e=>{const v=T[e.dataset.i18n];if(v!=null)e.innerHTML=v;});
  document.querySelectorAll('.langbar button').forEach(b=>b.classList.toggle('on',b.dataset.lang===l));
  covChart('covL','L');covChart('covLCSG','LCSG');crpsChart();tbl();
}
document.querySelectorAll('.langbar button').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)));
let init='zh';try{init=localStorage.getItem('geopfn_lang')||'zh';}catch(e){}
setLang(['zh','ja','en'].includes(init)?init:'zh');
</script>
