<script>
const DATA={
 Ns:[3,6,12,25,50,100,192],
 cov90:{L:[.910,.901,.947,.981,.975,.971,.974],LCSG:[.854,.875,.940,.979,.972,.978,.981]},
 rel:{ // empirical hit rate at promised levels [0, .5, .8, .9, .95, 1]
  levels:[0,.5,.8,.9,.95,1],
  L:{n3:[0,.591,.838,.910,.947,1],n25:[0,.665,.932,.981,.994,1],nall:[0,.646,.939,.974,.990,1]},
  LCSG:{n3:[0,.497,.766,.854,.900,1],n25:[0,.663,.935,.979,.995,1],nall:[0,.703,.946,.981,.989,1]}
 },
 crps:{L:[14.69,13.01,12.04,10.98,10.89,10.16,9.94],LCSG:[15.96,14.28,12.46,11.19,10.66,10.27,9.44]},
 w90:{L:[106.2,87.0,86.7,103.6,93.2,88.7,85.8],LCSG:[89.5,80.9,86.5,96.1,88.7,86.0,82.2]},
 rho:{L:[.264,.199,.287,.261,.327,.282,.254],LCSG:[.296,.236,.351,.324,.334,.342,.359]},
 rmse:{L:[26.25,23.64,22.75,20.11,20.75,18.93,18.70],LCSG:[30.05,26.29,23.55,20.83,20.35,19.46,18.18]}
};
const NS='http://www.w3.org/2000/svg';
const el=(n,a,p)=>{const e=document.createElementNS(NS,n);for(const k in a)e.setAttribute(k,a[k]);if(p)p.appendChild(e);return e;};
const tip=document.getElementById('tip');
document.addEventListener('mousemove',e=>{const t=e.target.tagName;if(t!=='circle'&&t!=='rect')tip.style.opacity=0;});
function showTip(ev,txt){tip.textContent=txt;tip.style.left=(ev.clientX+12)+'px';tip.style.top=(ev.clientY+12)+'px';tip.style.opacity=1;}

function bar90(){
  const svg=document.getElementById('bar90');svg.replaceChildren();
  const W=620,H=280,m={l:46,r:14,t:16,b:40},Ns=DATA.Ns;
  const yLo=0.7,yHi=1.0,Y=v=>H-m.b-(v-yLo)/(yHi-yLo)*(H-m.t-m.b);
  const groupW=(W-m.l-m.r)/Ns.length,bw=groupW*0.28;
  for(let g=0.7;g<=1.001;g+=0.05){el('line',{x1:m.l,y1:Y(g),x2:W-m.r,y2:Y(g),stroke:'var(--grid)'},svg);
    el('text',{x:m.l-6,y:Y(g)+3.5,'text-anchor':'end',fill:'var(--muted)','font-size':9.5,'font-family':'var(--mono)'},svg).textContent=Math.round(g*100)+'%';}
  Ns.forEach((n,i)=>{
    const cx=m.l+groupW*(i+0.5);
    el('text',{x:cx,y:H-m.b+16,'text-anchor':'middle',fill:'var(--muted)','font-size':10,'font-family':'var(--mono)'},svg).textContent=(n===192?'all':n);
    for(const [fs,color,off] of [['L','var(--l)',-bw-1],['LCSG','var(--lcsg)',1]]){
      const v=DATA.cov90[fs][i];
      const r=el('rect',{x:cx+off,y:Y(Math.max(v,yLo)),width:bw,height:Math.max(1,Y(yLo)-Y(Math.max(v,yLo))),rx:2.5,fill:color,'fill-opacity':.85},svg);
      r.addEventListener('mouseenter',ev=>showTip(ev,`${fs}  N=${n===192?'all':n}  ${(v*100).toFixed(1)}%`));
    }
  });
  el('line',{x1:m.l,y1:Y(0.9),x2:W-m.r,y2:Y(0.9),stroke:'var(--ok)','stroke-width':2,'stroke-dasharray':'6 4'},svg);
  el('text',{x:W-m.r-4,y:Y(0.9)-5,'text-anchor':'end',fill:'var(--ok)','font-size':10.5,'font-weight':700},svg).textContent=T.targetLab;
  el('text',{x:(m.l+W-m.r)/2,y:H-6,'text-anchor':'middle',fill:'var(--ink2)','font-size':11,'font-weight':600},svg).textContent=T.xlab;
}
function relChart(id,fs){
  const svg=document.getElementById(id);svg.replaceChildren();
  const W=420,H=320,m={l:46,r:12,t:12,b:44};
  const X=v=>m.l+v*(W-m.l-m.r),Y=v=>H-m.b-v*(H-m.t-m.b);
  for(let g=0;g<=1.001;g+=0.2){
    el('line',{x1:m.l,y1:Y(g),x2:W-m.r,y2:Y(g),stroke:'var(--grid)'},svg);
    el('text',{x:m.l-6,y:Y(g)+3.5,'text-anchor':'end',fill:'var(--muted)','font-size':9.5,'font-family':'var(--mono)'},svg).textContent=Math.round(g*100)+'%';
    el('text',{x:X(g),y:H-m.b+15,'text-anchor':'middle',fill:'var(--muted)','font-size':9.5,'font-family':'var(--mono)'},svg).textContent=Math.round(g*100)+'%';
  }
  el('line',{x1:X(0),y1:Y(0),x2:X(1),y2:Y(1),stroke:'var(--muted)','stroke-width':1.4,'stroke-dasharray':'6 4'},svg);
  el('text',{x:(m.l+W-m.r)/2,y:H-6,'text-anchor':'middle',fill:'var(--ink2)','font-size':10.5,'font-weight':600},svg).textContent=T.relX;
  el('text',{x:13,y:(m.t+H-m.b)/2,'text-anchor':'middle',fill:'var(--ink2)','font-size':10.5,'font-weight':600,transform:`rotate(-90,13,${(m.t+H-m.b)/2})`},svg).textContent=T.relY;
  const lv=DATA.rel.levels;
  for(const [key,color,name] of [['n3','var(--n3)','N=3'],['n25','var(--n25)','N=25'],['nall','var(--nall)',T.legAll]]){
    const v=DATA.rel[fs][key];const pts=v.map((y,i)=>`${X(lv[i])},${Y(y)}`).join(' ');
    el('polyline',{points:pts,fill:'none',stroke:color,'stroke-width':2.3,'stroke-linejoin':'round'},svg);
    v.forEach((y,i)=>{if(lv[i]===0||lv[i]===1)return;
      const c=el('circle',{cx:X(lv[i]),cy:Y(y),r:3.4,fill:color,stroke:'var(--panel)','stroke-width':1.1},svg);
      c.addEventListener('mouseenter',ev=>showTip(ev,`${fs} ${name}: ${T.relX} ${Math.round(lv[i]*100)}% → ${(y*100).toFixed(1)}%`));});
  }
}
function xmapLog(W,m){const Ns=DATA.Ns,lx=Ns.map(n=>Math.log(n)),x0=Math.min(...lx),x1=Math.max(...lx);
  return v=>m.l+(Math.log(v)-x0)/(x1-x0)*(W-m.l-m.r);}
function crpsChart(){
  const svg=document.getElementById('crps');svg.replaceChildren();
  const W=580,H=280,m={l:42,r:56,t:12,b:38},Ns=DATA.Ns,X=xmapLog(W,m);
  const vals=[...DATA.crps.L,...DATA.crps.LCSG];const yLo=Math.floor(Math.min(...vals)-1),yHi=Math.ceil(Math.max(...vals)+1);
  const Y=v=>H-m.b-(v-yLo)/(yHi-yLo)*(H-m.t-m.b);
  for(let g=Math.ceil(yLo/2)*2;g<=yHi;g+=2){el('line',{x1:m.l,y1:Y(g),x2:W-m.r,y2:Y(g),stroke:'var(--grid)'},svg);
    el('text',{x:m.l-6,y:Y(g)+3.5,'text-anchor':'end',fill:'var(--muted)','font-size':9.5,'font-family':'var(--mono)'},svg).textContent=g;}
  for(const n of Ns)el('text',{x:X(n),y:H-m.b+15,'text-anchor':'middle',fill:'var(--muted)','font-size':9.5,'font-family':'var(--mono)'},svg).textContent=(n===192?'all':n);
  el('text',{x:(m.l+W-m.r)/2,y:H-4,'text-anchor':'middle',fill:'var(--ink2)','font-size':10.5,'font-weight':600},svg).textContent=T.xlab;
  el('text',{x:13,y:(m.t+H-m.b)/2,'text-anchor':'middle',fill:'var(--ink2)','font-size':11,'font-weight':600,transform:`rotate(-90,13,${(m.t+H-m.b)/2})`},svg).textContent='CRPS';
  for(const [fs,color] of [['L','var(--l)'],['LCSG','var(--lcsg)']]){
    const v=DATA.crps[fs];const pts=v.map((y,i)=>`${X(Ns[i])},${Y(y)}`).join(' ');
    el('polyline',{points:pts,fill:'none',stroke:color,'stroke-width':2.4,'stroke-linejoin':'round'},svg);
    v.forEach((y,i)=>{const c=el('circle',{cx:X(Ns[i]),cy:Y(y),r:3.2,fill:color,stroke:'var(--panel)','stroke-width':1.1},svg);
      c.addEventListener('mouseenter',ev=>showTip(ev,`${fs}  N=${Ns[i]===192?'all':Ns[i]}  CRPS ${y.toFixed(2)}`));});
    el('text',{x:X(Ns[Ns.length-1])+7,y:Y(v[v.length-1])+3.5,fill:color,'font-size':11,'font-weight':700},svg).textContent=fs;
  }
}
function tbl(){
  const Ns=DATA.Ns;
  let h=`<tr><th>N</th><th>${T.thHit} L</th><th>${T.thHit} LCSG</th><th>w90 L</th><th>CRPS L</th><th>CRPS LCSG</th><th>ρ L</th><th>ρ LCSG</th><th>RMSE L</th></tr>`;
  for(let i=0;i<Ns.length;i++){
    h+=`<tr><td>${Ns[i]===192?'all':Ns[i]}</td><td>${(DATA.cov90.L[i]*100).toFixed(1)}%</td><td>${(DATA.cov90.LCSG[i]*100).toFixed(1)}%</td>`+
       `<td>${DATA.w90.L[i].toFixed(0)}</td><td>${DATA.crps.L[i].toFixed(1)}</td><td>${DATA.crps.LCSG[i].toFixed(1)}</td>`+
       `<td>${DATA.rho.L[i].toFixed(2)}</td><td>${DATA.rho.LCSG[i].toFixed(2)}</td><td>${DATA.rmse.L[i].toFixed(1)}</td></tr>`;
  }
  document.getElementById('tbl').innerHTML=h;
}
let T;
const I18N={
 zh:{
  kick:"geo_pfn · 稀疏不确定性 · 校准评估",
  title:"上下文只有几口孔时,geo-PFN 说的「把握」可信吗?",
  lede:"我们领域定位的核心交付:数据稀缺时,模型不仅要给预测值,还要诚实地说明自己有多大把握。本评估在稀疏协议(固定 48 孔查询,从其余抽 N 口整孔作上下文)上检验 geo-PFN 的预测区间是否说到做到。模型:2M @24k(稀疏最优 checkpoint)。",
  s1h:"先用一句话说清「校准」",
  s1exp:"geo-PFN 每次预测不只给一个数,还给一个<b>区间</b>并声明把握——比如「我有 <b>90%</b> 的把握,这个深度的 Su 在 <b>40–120</b> 之间」。检验办法很直接:把几千次这样的承诺收集起来,<b>数一数真值实际落进区间的比例(命中率)</b>。说 90% 就真有约 90% 命中 → <b>诚实(校准好)</b>;命中率低于承诺 → <b>过度自信(危险:它自信地错)</b>;明显高于承诺 → <b>过于保守(区间画得比需要的宽)</b>。",
  s1p:"技术上:geo-PFN 的 bar-distribution 头输出每个查询点的完整概率分布,8 次 ensemble 按各自上下文反归一化后混合;区间、命中率、CRPS 等全部在这个混合分布上闭式计算,并经 Monte-Carlo 验证。",
  s2h:"主图:承诺 90%,实际命中了多少?",
  s2p:"下图每根柱子 = 模型声明「90% 把握」的区间在该上下文规模 N 下的<b>实际命中率</b>。绿色虚线 = 90% 目标:柱子顶到线上 = 诚实;低于线 = 过度自信;高出 = 保守。",
  legTarget:"90% 目标(诚实线)",
  capBar:"「说 90% 就该中 90%」:实际命中率 vs 上下文孔数 N。最要紧的是最左边——上下文只有 3 口孔时,L 特征下命中 91.0%,几乎完美。",
  s2call:"<b>关键读法:</b>我们最担心的场景是最左边(N=3,数据最少)——若模型在这里过度自信,它会「自信地错」,这在工程上是危险的。实际结果:<b>L 特征 N=3 命中 91.0%(承诺 90%)——几乎完美诚实</b>;LCSG 在 N≤6 有轻微过度自信(85–88%),幅度温和。反而是上下文充足时(N≥25)命中 97–98%——偏保守,区间画宽了。",
  s3h:"完整检验:把 50%–95% 的承诺都验一遍(可靠性图)",
  s3p:"同样的检验对每档承诺(50%、80%、90%、95%)都做一次:横轴 = 模型承诺的把握,纵轴 = 实际命中率。<b>贴住对角虚线 = 完美诚实;线在对角线下方 = 过度自信;上方 = 保守</b>。",
  legAll:"N=全部(192)",legDiag:"对角线 = 完美诚实",
  relX:"模型承诺的把握",relY:"实际命中率",

 en:{
  kick:"geo_pfn · sparse uncertainty · calibration eval",
  title:"With only a few boreholes of context, can geo-PFN's stated confidence be trusted?",
  lede:"The core deliverable of our niche: when data is scarce, the model must give not just a value but an honest statement of how sure it is. This eval runs the sparse protocol (fixed 48-hole query, N whole holes drawn as context) and tests whether geo-PFN's prediction intervals keep their promises. Model: 2M @24k (the best sparse checkpoint).",
  s1h:"Calibration in one sentence",
  s1exp:"Each geo-PFN prediction is not just a number but an <b>interval</b> with a stated confidence — e.g. \"I am <b>90%</b> sure the Su at this depth is between <b>40 and 120</b>\". The test is direct: collect thousands of such promises and <b>count how often the true value actually lands inside (the hit rate)</b>. Saying 90% and hitting ~90% → <b>honest (well calibrated)</b>; hitting less than promised → <b>over-confident (dangerous: confidently wrong)</b>; hitting clearly more → <b>conservative (intervals wider than needed)</b>.",
  s1p:"Technically: the bar-distribution head outputs a full probability distribution per query point; the 8 ensemble draws are combined via their context affines into an exact mixture; intervals, hit rates and CRPS are computed in closed form on that mixture and Monte-Carlo validated.",
  s2h:"Headline: promised 90% — how often did it actually hit?",
  s2p:"Each bar = the <b>actual hit rate</b> of the intervals the model declared with \"90% confidence\", at context size N. Green dashed line = the 90% target: bar reaching the line = honest; below = over-confident; above = conservative.",
  legTarget:"90% target (honesty line)",
  capBar:"\"Say 90%, hit 90%\": actual hit rate vs context size N. The leftmost bars matter most — with only 3 boreholes of context, L features hit 91.0%, near-perfect.",
  s2call:"<b>How to read it:</b> the scariest scenario is the far left (N=3, least data) — if the model were over-confident there, it would be confidently wrong, which is dangerous in engineering. In fact: <b>L features at N=3 hit 91.0% (promised 90%) — near-perfectly honest</b>; LCSG shows mild over-confidence at N≤6 (85–88%). If anything, with plenty of context (N≥25) it hits 97–98% — conservative, drawing intervals wider than needed.",
  s3h:"The full test: verify every promise from 50% to 95% (reliability diagram)",
  s3p:"The same test at every promise level (50%, 80%, 90%, 95%): x = the confidence the model declared, y = the actual hit rate. <b>On the dashed diagonal = perfectly honest; below = over-confident; above = conservative</b>.",
  legAll:"N=all (192)",legDiag:"diagonal = perfect honesty",
  relX:"declared confidence",relY:"actual hit rate",
  capRelL:"Coords-only (L): all three lines hug the diagonal; N=3 (orange) closest — most honest exactly at extreme sparsity.",
  capRelLCSG:"With real features (LCSG): N=3 (orange) sits slightly below the diagonal = mild over-confidence; N≥25 sits above = conservative.",
  s3call:"<b>The verdict is the opposite of the fear (in the good direction):</b> \"confidently wrong at extreme sparsity\" does not happen. As context shrinks the model <b>widens its own intervals</b> (mean 90%-interval width: 86 with all context → 106 kN/m² at N=3), and truths fall entirely outside the predicted distribution ≤0.4% of the time. The error direction is conservative (too wide), not dangerous (over-confident).",
  s4h:"Overall distributional quality vs context (CRPS)",
  s4p:"CRPS is the 'total score' for distributional prediction, penalising inaccuracy and over-wide intervals together (lower is better). It improves monotonically with N (L: 14.7 → 9.9) — no sparsity level collapses.",
  capCrps:"CRPS falls monotonically with context size N; L and LCSG track each other.",
  s5h:"Full numbers",
  s5pt:"2M @24k (best sparse). Hit rate = actual hit of the promised-90% interval; w90 = mean 90%-interval width (kN/m²); ρ = Spearman corr of predicted uncertainty with actual error (does the model know which rows it will get wrong).",
  thHit:"hit@90%",
  s6h:"Verdict",
  v1:"<b>The core claim holds: uncertainty is trustworthy at extreme sparsity.</b> 91.0% hits at N=3 with coords only (promised 90%), catastrophic over-confidence ≤0.4%, and intervals honestly widen as data shrinks — exactly the capability our domain needs and general tabular models don't offer.",
  v2:"<b>Mild weakness:</b> LCSG at N≤6 hits 85–88% (mild over-confidence); the 17M cross-check shows the same pattern with worse point predictions — reaffirming the 2M for sparse use.",
  v3:"<b>Improvement areas are on the conservative side:</b> over-wide intervals from N≥25 (97–98% hits, sharpness left on the table) + ρ only 0.2–0.36 (weak at ranking which rows go wrong). Both can become explicit objectives for the small-context training.",
  v4:"<b>TabICL's distributional output not yet compared</b> (its regressor's distribution API needs investigation); this report establishes our own calibration baseline first.",

 }

function setLang(l){
  document.documentElement.lang=l==='zh'?'zh-CN':l==='ja'?'ja':'en';
  try{localStorage.setItem('geopfn_lang',l);}catch(e){}
  T=I18N[l]||I18N.zh;
  document.querySelectorAll('[data-i18n]').forEach(e=>{const v=T[e.dataset.i18n];if(v!=null)e.innerHTML=v;});
  document.querySelectorAll('.langbar button').forEach(b=>b.classList.toggle('on',b.dataset.lang===l));
  bar90();relChart('relL','L');relChart('relLCSG','LCSG');crpsChart();tbl();
}
document.querySelectorAll('.langbar button').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)));
let init='zh';try{init=localStorage.getItem('geopfn_lang')||'zh';}catch(e){}
setLang(['zh','ja','en'].includes(init)?init:'zh');
</script>
