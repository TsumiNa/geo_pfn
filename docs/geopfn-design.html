  kick:"geo_pfn · 設計ノート",
  title:"地盤ボーリングのための PFN:似た孔で、未知の孔を予測する",
  lede:"現行の geo-SCM 事前分布と2段構成 geo-PFN アーキテクチャの設計ノート——設計の要点と、なぜこう設計したか。",
  s1h:"ビジョンと賭け",
  s1p1:"<b>ビジョン:</b>任意の座標+深度ベクトル(さらに、しばしば得られる安価な土質データ)を与えると、その地点の<b>仮想ボーリングの全物性テーブル</b>を、<b>不確実性</b>付きで出力する。難しさは:ボーリングが疎、Su(非排水せん断強度)試験が高価、欠測がブロック状・非ランダム(MNAR)であること。",
  s1p2:"<b>賭け:</b>浅い層で深い層を当てるのは筋が悪い。有効なのは<b>似た孔で未知の孔を予測する</b>——本質は<b>距離学習(metric learning)</b>:孔と孔の類似度を学び、疎な対象孔が最も似た近傍の断面を借りる。これを <span class='tag'>PFN</span>(Prior-data Fitted Network)で実現する。",
  s1call:"<b>一言で:</b>事前分布(合成データの生成分布)= モデルの帰納バイアス。地盤構造を事前分布に書き込み、推論時に文脈でベイズ的な事後予測を行う——値と不確実性を同時に。",
  s2h:"PFN とは(30秒)",
  s2p1:"PFN は<b>合成タスク</b>で事前学習する:各タスクは<b>事前分布</b>から1枚の表(文脈行+クエリ行)をサンプルし、文脈からクエリを予測する。十分なタスクを学べば、推論では実データを文脈として入れるだけ——<b>再学習なし</b>、1回の順伝播で<b>ベイズ事後予測分布</b>を近似する。ゆえに事前分布が実地盤にどれだけ似ているかが上限を決める。",
  s3h:"geo-SCM 事前分布:一つの現場を合成する",
  s3p1:"「適当な表」ではなく、<b>一つの現場(site)</b>——同じ因果則を共有する複数のボーリング——をサンプルする。下図の生成パイプラインが地盤構造を一段ずつ注入する。",
  d1a:"深度軸",d1b:"指数間隔サンプル",
  d2a:"層序分割",d2b:"Poisson 層数・土質",
  d3a:"潜在物性場",d3b:"層内は緩・層界で急変",
  d4a:"ランダム MLP-SCM",d4b:"潜在→特徴+目的",
  d5a:"観測層",d5b:"アフィン+ブロック欠測",
  d6a:"多孔 site",d6b:"共有 SCM + 平滑空間場",d6c:"近い孔は類似 · anchor 文脈マスク",
  dinset:"深度断面",djump:"層界ジャンプ",
  d_cap:"geo-SCM 生成パイプライン:1回で1本のボーリング(=行ごとの試料)を生成し、多孔の現場に組み立てる。左下の挿図は「層内は緩やか・層界で急変」する潜在物性の深度変化を示す。",
  s3l1:"<b>1孔1表:</b>各行は1つの深度試料で、表は深度順——実ボーリングの記録形態に一致。",
  s3l2:"<b>層内は緩・層界で急変:</b>潜在場は層内で小さなランダムウォーク、層界で跳躍(層内歩幅の約1.3〜2倍)——実地層の核心構造。",
  s3l3:"<b>目的変数は下流:</b>Su は SCM 最深層のノード、安価な特徴は上流——「強度は含水比/塑性/密度の結果」という物理に対応。",
  s3l4:"<b>site = 多孔 + 空間場:</b>近い孔の潜在場は同じ平滑空間場で一様に上下 → 近孔は類似。一部の孔は少数のアンカーのみ残し、配備時の疎な推論を学習に組み込む。",
  s4h:"2段構成 geo-PFN アーキテクチャ",
  s4p1:"TabICL の段階的相互注意を参考に、「行(ボーリング試料)類似性」を<b>一級の対象</b>にする。3段+回帰ヘッド:",
  a0:"ボーリング表",
  a1a:"① 列エンコーダ",a1b:"サンプル軸方向の注意",a1c:"各列を分布で埋め込み",
  a2a:"② 行圧縮",a2b:"CLS → 行ベクトル",a2c:"1試料 = 1ベクトル",
  a3a:"③ 行距離 ICL",a3b:"行ベクトルの soft-kNN",a3c:"← 類似性機構はここ",
  a4a:"回帰ヘッド",a4b:"bar-distribution",a4c:"値 + 不確実性",
  a_cap:"2段構成 geo-PFN(2.0M パラメータ):列エンコード → 行圧縮 → 行距離 ICL → ビン分布ヘッド。第③段が行ベクトルの距離空間で soft-kNN を行う——まさに「似た孔で未知の孔を予測する」の実装点。",
  s4call:"<b>bar-distribution(ビン分布)ヘッド:</b>連続目的を数百のビンに離散化し、ビン上の確率を出力。分布の平均=点推定、分布の幅=不確実性——ビジョンの「値+不確実性」そのもので、TabICL/v2 と RMSE で同じ土俵に立てる。土質分類には設定可能な分類ヘッドを別に付ける。",
  s5h:"なぜこう設計するか",
  s5p1:"2段構成の要は、「孔・行全体の類似性」を明示化し、per-cell 注意のようにセル単位で混ぜないこと。これがあなたの仮説を直接実装する:",
  s5l1:"<b>行距離 = 距離学習:</b>第③段は「どの近傍孔が対象に最も似るか」を学び、多孔 site 事前分布の目的(孔間転移)と整合する。",
  s5l2:"<b>coherent 文脈:</b>推論では座標で<b>最も近い丸ごとの孔</b>を文脈に選ぶ(ランダム行でなく)——訓練時の「1孔1組」分布に一致し、疎・ランダム文脈に頑健。",
  s6h:"事前分布の現実性:修正中のギャップ",
  s6p1:"geo-PFN に実際の安価な土質特徴を与えると<b>悪化</b>した(LCSG の全孔 holdout 22.9 > 座標のみ 19.3)。原因:ランダム MLP 事前分布は各特徴を「情報量大かつ独立」と教えるが、実特徴は逆——<b>強く共線なクラスタ</b>(PC1 が76%)で、その主軸は<b>深度と冗長でほぼ Su 信号を持たない</b>(深度を超えて +0.12 R² のみ)。事前分布が関係を逆に教えていた。",
  s6call:"<b>修正(§10 geo-realistic block):</b>合成の安価特徴に実構造を再現させる——平滑な「軟硬/含水」潜在因子が実 PC1 方向に共線クラスタを駆動し、実周辺分布へ写像、目的はその弱結合のみ受ける。新事前分布での再学習が進行中で、その後 A/B で LCSG ペナルティ消失を検証する。",
  s7h:"これまでに検証できたこと",
  s7p1:"実ボーリング上の<b>疎文脈実験</b>(少数の丸ごとの孔で他孔を予測)が、機構レベルの肯定的証拠を与えた:",
  s7l1:"<b>類似性機構の出現:</b>中程度の疎領域(文脈 N=25〜50 孔)で geo-PFN は TabICL より 4〜6 RMSE 低く、文脈増減に対し<b>単調で安定</b>。TabICL は乱高下——geo-PFN のパラメータ/学習量が遥かに小さいにもかかわらず。",
  s7l2:"<b>安価な地質は有用:</b>「疎で貴重なボーリング + 安価な大規模地質」は TabICL/hgbt を各段で +2〜6 RMSE 改善。geo-PFN は今は活かせない(事前分布のギャップ)、修正中。",
  s7l3:"<b>ロードマップ:</b>事前分布の現実性(最大のレバー)→ 規模拡大 → 実データ微調整 → 分類ヘッド整備。絶対精度は TabICL に劣るが、類似性の路線は正しいと検証された。",
  foot:"設計ノート · 値 + 不確実性 · 似た孔で未知の孔を予測する"
 },
 en:{
  kick:"geo_pfn · Design Notes",
  title:"A PFN for geotechnical boreholes: predict the unknown hole from similar ones",
  lede:"A design note that makes the current geo-SCM prior and the two-stage geo-PFN architecture legible — the key design choices, and why they are the way they are.",
  s1h:"Vision & the bet",
  s1p1:"<b>Vision:</b> the user gives an arbitrary coordinate + a depth vector (plus, often, some cheap geotechnical data), and the model returns the <b>full property table of a virtual borehole</b> there, <b>with uncertainty</b>. What makes it hard: boreholes are sparse, Su (undrained shear strength) testing is expensive, and missingness is block-wise and not-at-random (MNAR).",
  s1p2:"<b>The bet:</b> predicting deep from shallow won't work; what does is <b>predicting an unknown hole from similar holes</b> — essentially <b>metric learning</b>: learn a hole-to-hole similarity so a sparsely-sampled target borrows the profile of the neighbour it most resembles. We realise it with a <span class='tag'>PFN</span> (Prior-data Fitted Network).",
  s1call:"<b>In one line:</b> the prior (the generating distribution of the synthetic data) is the model's inductive bias. Write the geology into the prior, then let the PFN do Bayesian-style posterior prediction from context at inference — value and uncertainty together.",
  s2h:"What a PFN is (30 seconds)",
  s2p1:"A PFN is pre-trained on <b>synthetic tasks</b>: each task samples one table (context rows + query rows) from a <b>prior</b>, and the model learns to predict the query from the context. After enough tasks, inference just feeds real data as context — <b>no retraining</b>, one forward pass approximates the <b>Bayesian posterior predictive distribution</b>. So how closely the prior resembles real geology sets the ceiling.",
  s3h:"The geo-SCM prior: synthesise a site",
  s3p1:"We don't sample \"arbitrary tables\" — we sample <b>a site</b>: several boreholes sharing one causal law. The generative pipeline (below) injects geological structure one stage at a time.",
  d1a:"Depth axis",d1b:"Exp-spaced samples",
  d2a:"Stratigraphy",d2b:"Poisson layers · soil",
  d3a:"Latent field",d3b:"smooth in-layer · jump across",
  d4a:"Random MLP-SCM",d4b:"latent→features+target",
  d5a:"Observation",d5b:"affine + block-missing",
  d6a:"Multi-hole site",d6b:"shared SCM + smooth spatial field",d6c:"near holes similar · anchor context masks",
  dinset:"depth profile",djump:"layer jump",
  d_cap:"geo-SCM generative pipeline: one borehole per draw (rows = depth specimens), assembled into a multi-hole site. The lower-left inset sketches the 'smooth within a layer, jump across a boundary' latent evolution with depth.",
  s3l1:"<b>One hole per table:</b> each row is a depth specimen, ordered by depth — matching how real boreholes are logged.",
  s3l2:"<b>Smooth within, jump across:</b> the latent field is a small random walk within a layer and jumps at a boundary (≈1.3–2× the in-layer step) — the core structure of real strata.",
  s3l3:"<b>Target downstream:</b> Su is the deepest SCM node, cheap features are upstream — mirroring the physics that strength is a consequence of water content / plasticity / density.",
  s3l4:"<b>Site = multi-hole + spatial field:</b> nearby holes' latents are shifted together by one smooth spatial field → near holes resemble each other; some holes keep only a few anchors, writing the sparse deployment inference directly into training.",
  s4h:"The two-stage geo-PFN architecture",
  s4p1:"Borrowing TabICL's staged cross-attention, it makes \"row (borehole specimen) similarity\" a <b>first-class object</b>. Three stages + a regression head:",
  a0:"borehole table",
  a1a:"① Column encoder",a1b:"attention along sample axis",a1c:"embed each column by its distribution",
  a2a:"② Row compression",a2b:"CLS → row vector",a2c:"one specimen = one vector",
  a3a:"③ Row-metric ICL",a3b:"soft kNN over row vectors",a3c:"← similarity mechanism here",
  a4a:"Regression head",a4b:"bar-distribution",a4c:"value + uncertainty",
  a_cap:"Two-stage geo-PFN (2.0M params): column-encode → row-compress → row-metric ICL → bar-distribution head. Stage ③ does soft kNN in the row-vector metric space — exactly where 'predict the unknown hole from similar ones' lands.",
  s4call:"<b>Bar-distribution head:</b> discretise the continuous target into hundreds of bins and output a probability over them. Distribution mean = point estimate, distribution width = uncertainty — precisely the vision's 'value + uncertainty', and it lets the model compete on RMSE with TabICL/v2. Soil class gets a separate, configurable classification head.",
  s5h:"Why this design",
  s5p1:"The point of the two-stage form is to make \"whole-row/whole-hole similarity\" explicit, rather than mixing at the cell level like per-cell attention. This directly implements the hypothesis:",
  s5l1:"<b>Row-metric = metric learning:</b> stage ③ learns \"which neighbour hole most resembles the target\", aligned with the multi-hole site prior's training objective (cross-hole transfer).",
  s5l2:"<b>Coherent context:</b> at inference it selects the <b>nearest whole boreholes</b> by coordinate as context (not random rows) — matching the training 'one hole = one group' distribution, and robust to sparse/random context.",
  s6h:"Prior realism: a gap being fixed",
  s6p1:"We found that giving geo-PFN the real cheap geotech features made it <b>worse</b> (LCSG whole-hole holdout 22.9 > coordinates-only 19.3). Cause: the random-MLP prior teaches every feature to be \"informative and independent\", but the real features are the opposite — a <b>tightly collinear cluster</b> (PC1 is 76%) whose dominant axis is <b>redundant with depth and carries almost no Su signal</b> (only +0.12 R² beyond depth). The prior taught the relationship backwards.",
  s6call:"<b>The fix (§10 geo-realistic block):</b> make the synthetic cheap features reproduce the real structure — a smooth 'softness/water-state' latent drives the collinear cluster along the real PC1 direction, mapped to real marginals, with the target only weakly coupled to it. Retraining on the new prior is under way; an A/B will then check whether the LCSG penalty disappears.",
  s7h:"What we have verified so far",
  s7p1:"The <b>sparse-context experiment</b> on real boreholes (predict other holes from a few whole holes) gives positive mechanism-level evidence:",
  s7l1:"<b>The similarity mechanism shows up:</b> in the mid-sparse regime (N=25–50 context holes) geo-PFN is 4–6 RMSE below TabICL and degrades <b>monotonically and stably</b> with context size, while TabICL is erratic — despite geo-PFN being far smaller and less trained.",
  s7l2:"<b>Cheap geology does help:</b> 'sparse precious boreholes + cheap large-scale geology' improves TabICL/hgbt by +2–6 RMSE at every size; geo-PFN can't use it yet (the prior gap), being fixed.",
  s7l3:"<b>Roadmap:</b> prior realism (the biggest lever) → scale up → real-data fine-tuning → complete the classification head. Absolute accuracy still trails TabICL, but the similarity route is validated.",
  foot:"design notes · value + uncertainty · predict the unknown hole from similar ones"
 }
};
function setLang(l){
  document.documentElement.lang=l==='zh'?'zh-CN':l==='ja'?'ja':'en';
  try{localStorage.setItem('geopfn_lang',l);}catch(e){}
  const d=I18N[l]||I18N.zh;
  document.querySelectorAll('[data-i18n]').forEach(e=>{const v=d[e.dataset.i18n];if(v!=null)e.innerHTML=v;});
  document.querySelectorAll('.langbar button').forEach(b=>b.classList.toggle('on',b.dataset.lang===l));
}
document.querySelectorAll('.langbar button').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)));
let init='zh';try{init=localStorage.getItem('geopfn_lang')||'zh';}catch(e){}
setLang(['zh','ja','en'].includes(init)?init:'zh');
</script>
