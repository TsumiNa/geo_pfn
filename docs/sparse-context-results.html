svg{display:block;margin:0 auto;max-width:100%;height:auto}
.legend{display:flex;gap:18px;justify-content:center;flex-wrap:wrap;margin:2px 0 8px;font:600 12px var(--sans)}

<script>
const DATA={
 Ns:[3,6,12,25,50,100,192],
 L:{tabicl:[24.74,24.77,21.09,26.33,24.01,20.61,19.24],geopfn:[28.50,24.65,20.74,20.03,20.01,18.92,19.12],hgbt:[29.05,22.74,21.97,21.47,20.81,19.67,18.53]},
 LSG:{tabicl:[22.49,23.23,20.37,20.36,20.92,18.45,17.12],geopfn:[26.52,26.28,22.99,22.01,21.31,20.58,20.10],hgbt:[29.41,23.58,21.33,20.54,20.12,19.26,17.36]},
 benefit:{tabicl:[2.25,1.54,0.72,5.97,3.09,2.15,2.11],geopfn:[1.98,-1.63,-2.25,-1.99,-1.30,-1.66,-0.98],hgbt:[-0.37,-0.84,0.64,0.93,0.69,0.41,1.17]}
};
const MC={tabicl:'var(--tab)',geopfn:'var(--gp)',hgbt:'var(--hg)'};
const SVGNS='http://www.w3.org/2000/svg';
const el=(n,a,p)=>{const e=document.createElementNS(SVGNS,n);for(const k in a)e.setAttribute(k,a[k]);if(p)p.appendChild(e);return e;};
const tip=document.getElementById('tip');
function showTip(ev,txt){tip.textContent=txt;tip.style.left=(ev.clientX+12)+'px';tip.style.top=(ev.clientY+12)+'px';tip.style.opacity=1;}
document.addEventListener('mousemove',e=>{if(e.target.tagName!=='circle')tip.style.opacity=0;});

function chart(id,series,yLo,yHi,opts){
  const svg=document.getElementById(id);svg.replaceChildren();
  const W=580,H=svg.id==='chartA'?320:300,m={l:44,r:56,t:14,b:42};
  const Ns=DATA.Ns,lx=Ns.map(n=>Math.log(n));
  const x0=Math.min(...lx),x1=Math.max(...lx);
  const X=v=>m.l+(Math.log(v)-x0)/(x1-x0)*(W-m.l-m.r);
  const Y=v=>H-m.b-(v-yLo)/(yHi-yLo)*(H-m.t-m.b);
  // gridlines + y ticks
  const step=opts.ystep||2;
  for(let g=Math.ceil(yLo/step)*step;g<=yHi;g+=step){
    el('line',{x1:m.l,y1:Y(g),x2:W-m.r,y2:Y(g),stroke:'var(--grid)','stroke-width':1},svg);
    el('text',{x:m.l-7,y:Y(g)+3.5,'text-anchor':'end',fill:'var(--muted)','font-size':10,'font-family':'var(--mono)'},svg).textContent=g;
  }
  if(opts.zero!=null){el('line',{x1:m.l,y1:Y(0),x2:W-m.r,y2:Y(0),stroke:'var(--ink2)','stroke-width':1.2,'stroke-dasharray':'4 3'},svg);}
  // x ticks (N)
  for(const n of Ns){el('text',{x:X(n),y:H-m.b+16,'text-anchor':'middle',fill:'var(--muted)','font-size':10,'font-family':'var(--mono)'},svg).textContent=(n===192?'all':n);}
  el('text',{x:(m.l+W-m.r)/2,y:H-6,'text-anchor':'middle',fill:'var(--ink2)','font-size':11,'font-weight':600},svg).textContent=opts.xlab;
  el('text',{x:14,y:(m.t+H-m.b)/2,'text-anchor':'middle',fill:'var(--ink2)','font-size':11,'font-weight':600,transform:`rotate(-90,14,${(m.t+H-m.b)/2})`},svg).textContent=opts.ylab;
  // highlight band (mid-sparse) for chart A
  if(opts.band){el('rect',{x:X(25),y:m.t,width:X(50)-X(25),height:H-m.t-m.b,fill:'var(--gp)','fill-opacity':.06},svg);}
  // series
  for(const s of series){
    const pts=s.vals.map((v,i)=>`${X(Ns[i])},${Y(v)}`).join(' ');
    el('polyline',{points:pts,fill:'none',stroke:s.color,'stroke-width':2.4,'stroke-linejoin':'round','stroke-opacity':.95},svg);
    s.vals.forEach((v,i)=>{
      const c=el('circle',{cx:X(Ns[i]),cy:Y(v),r:3.4,fill:s.color,stroke:'var(--panel)','stroke-width':1.2},svg);
      c.addEventListener('mouseenter',ev=>showTip(ev,`${s.name}  N=${Ns[i]===192?'all':Ns[i]}  ${v.toFixed(2)}`));
    });
    // end label
    el('text',{x:X(Ns[Ns.length-1])+7,y:Y(s.vals[s.vals.length-1])+3.5,fill:s.color,'font-size':11,'font-weight':700},svg).textContent=s.name;
  }
}
function drawCharts(t){
  chart('chartA',[
    {name:'TabICL',color:MC.tabicl,vals:DATA.L.tabicl},
    {name:'geo-PFN',color:MC.geopfn,vals:DATA.L.geopfn},
    {name:'hgbt',color:MC.hgbt,vals:DATA.L.hgbt},
  ],17,30,{ystep:2,xlab:t.xlab,ylab:t.ylabA,band:true});
  chart('chartB',[
    {name:'TabICL',color:MC.tabicl,vals:DATA.benefit.tabicl},
    {name:'geo-PFN',color:MC.geopfn,vals:DATA.benefit.geopfn},
    {name:'hgbt',color:MC.hgbt,vals:DATA.benefit.hgbt},
  ],-3,6.5,{ystep:2,zero:0,xlab:t.xlab,ylab:t.ylabB});
}
function drawTable(t){
  const N=DATA.Ns;
  let h=`<tr><th>N</th><th>TabICL·L</th><th>geo-PFN·L</th><th>hgbt·L</th><th>TabICL·LSG</th><th>geo-PFN·LSG</th><th>hgbt·LSG</th></tr>`;
  for(let i=0;i<N.length;i++){
    const best=Math.min(DATA.L.tabicl[i],DATA.L.geopfn[i],DATA.L.hgbt[i]);
    const cell=(v)=>`<td class="${v===best?'best':''}">${v.toFixed(1)}</td>`;
    h+=`<tr><td>${N[i]===192?'all':N[i]}</td>${cell(DATA.L.tabicl[i])}${cell(DATA.L.geopfn[i])}${cell(DATA.L.hgbt[i])}`+
       `<td>${DATA.LSG.tabicl[i].toFixed(1)}</td><td>${DATA.LSG.geopfn[i].toFixed(1)}</td><td>${DATA.LSG.hgbt[i].toFixed(1)}</td></tr>`;
  }
  document.getElementById('tbl').innerHTML=h;
}

function setLang(l){
  document.documentElement.lang=l==='zh'?'zh-CN':l==='ja'?'ja':'en';
  try{localStorage.setItem('geopfn_lang',l);}catch(e){}
  const d=I18N[l]||I18N.zh;
  document.querySelectorAll('[data-i18n]').forEach(e=>{const v=d[e.dataset.i18n];if(v!=null)e.innerHTML=v;});
  document.querySelectorAll('.langbar button').forEach(b=>b.classList.toggle('on',b.dataset.lang===l));
  drawCharts(d);
}
